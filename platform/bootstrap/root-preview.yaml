apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-preview
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub
  source:
    repoURL: https://github.com/willdrz/devhub-campus-tp2.git
    targetRevision: main
    path: platform/apps/preview
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
